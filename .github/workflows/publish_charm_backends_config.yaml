name: Publish to edge for content-cache-backends-config

on:
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  publish-to-edge:
    uses: canonical/operator-workflows/.github/workflows/publish_charm.yaml@main
    permissions:
      actions: read
      contents: write
    secrets: inherit
    with:
      channel: latest/edge
      working-directory: ./content-cache-backends-config
